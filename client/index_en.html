<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay - Ooredoo</title>
    <style>
        :root {
            --ooredoo-red: #ed1c24;
            --ooredoo-bg: #f8f9fb;
            --alert-bg: #fdeaea;
            --alert-text: #b12a2e;
            --text-main: #000;
            --text-sub: #757575;
            --border-light: #ececec;
        }

        body {
            font-family: 'Segoe UI', Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--ooredoo-bg);
            color: var(--text-main);
            padding-bottom: 240px; 
        }

        .header {
            background: #fff;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 55px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            margin-bottom: 15px;
        }

        .lang-switch {
            font-size: 16px; 
            font-weight: bold; 
            color: var(--ooredoo-red); 
            width: 40px;
            text-decoration: none;
        }

        .header h1 {
            font-size: 18px; margin: 0; font-weight: bold; flex-grow: 1; text-align: center;
        }

        .support-icon { width: 40px; text-align: right; }
        .support-icon img { width: 22px; height: 22px; opacity: 0.6; }

        .promo-banner {
            background-color: #fff; width: 100%; display: flex; justify-content: center; margin-bottom: 10px;
        }
        .promo-banner img { width: 100%; height: auto; display: block; }

        .payment-card {
            background: #fff; margin: 15px; border-radius: 20px; padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02); margin-bottom: 10px;
        }

        .top-row {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }

        .btn-add-number {
            border: 1.5px solid var(--ooredoo-red); background: #fff; color: var(--ooredoo-red);
            padding: 6px 20px; border-radius: 25px; font-weight: bold; font-size: 13px; cursor: pointer;
        }

        .dynamic-fields-container { border-top: 1px solid var(--border-light); padding-top: 15px; }

        .row-group { margin-bottom: 15px; }

        .inputs-row-item {
            display: flex; gap: 15px; margin-bottom: 10px; align-items: flex-end;
            justify-content: space-between; position: relative;
        }

        .field-box { display: flex; flex-direction: column; flex: 1; }
        .field-box label { font-size: 14px; font-weight: bold; margin-bottom: 8px; text-align: left; }
        .field-box label span { color: var(--ooredoo-red); }

        .input-container {
            background: #fff; border: 1px solid var(--border-light); border-radius: 12px;
            height: 52px; width: 100%; display: flex; align-items: center; padding: 0 10px; box-sizing: border-box;
        }

        .input-container input {
            width: 100%; border: none; outline: none; font-size: 15px; text-align: left; background: transparent;
        }

        .amount-box { flex: 0.8 !important; }
        .currency-tag { font-weight: bold; font-size: 12px; margin-right: 5px; color: #000; }

        .error-message {
            background-color: var(--alert-bg);
            color: var(--alert-text);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
            display: none;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            margin-top: 5px;
            animation: fadeIn 0.3s ease-in;
            direction: ltr;
        }

        .error-message img { width: 16px; height: 16px; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .payment-options-section { padding: 0 20px; margin-top: 5px; text-align: left; }
        .options-title { font-size: 18px; font-weight: 900; color: #000; margin-bottom: 5px; display: block; }
        .options-subtitle { font-size: 13px; color: #000; font-weight: 500; line-height: 1.4; }

        .footer-action { position: fixed; bottom: 115px; left: 0; right: 0; padding: 0 20px; z-index: 999; }
        .main-pay-btn {
            width: 100%; background-color: #f1f1f1; color: #b5b5b5; border: none;
            padding: 14px; border-radius: 30px; font-size: 17px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: #fff; display: flex;
            justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--border-light); z-index: 1000;
        }
        .nav-item { text-align: center; color: var(--text-sub); font-size: 11px; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item img { width: 24px; height: 24px; }
        .nav-item.active .active-indicator { background-color: #fff1f1; padding: 6px 16px; border-radius: 12px; }
    </style>
</head>
<body>

    <script>
        console.log("Visit tracked - English Version - Bashmohandes Hassan");
    </script>

    <div class="header">
        <a href="index.html" class="lang-switch">العربية</a>
        <h1>Pay</h1>
        <div class="support-icon"><img src="https://img.icons8.com/ios/50/000000/headset.png"></div>
    </div>

    <div class="promo-banner">
        <img src="https://i.ibb.co/XZrzk5gJ/IMG-20260513-WA0119.jpg" alt="Promotion">
    </div>

    <div class="payment-card">
        <div class="top-row">
            <div class="checkbox-group">
                <input type="checkbox" style="width:18px; height:18px; accent-color: var(--ooredoo-red);">
                <span style="font-size: 14px; font-weight: bold; margin-left: 5px;">All Numbers</span>
            </div>
            <button class="btn-add-number" id="addMoreFields">Add Number</button>
        </div>

        <div class="dynamic-fields-container" id="fieldsWrapper">
            <div class="row-group">
                <div class="inputs-row-item">
                    <div class="field-box">
                        <label>Phone Number<span>*</span></label>
                        <div class="input-container">
                            <input type="tel" class="phone-input" placeholder="Phone Number" maxlength="8">
                        </div>
                    </div>
                    <div class="field-box amount-box">
                        <label>Amount<span>*</span></label>
                        <div class="input-container">
                            <input type="text" class="amount-input" placeholder="0.000">
                            <span class="currency-tag">KWD</span>
                        </div>
                    </div>
                </div>
                <div class="error-message">
                    <img src="https://img.icons8.com/material-rounded/24/b12a2e/cancel.png">
                    <span class="error-text">Please enter an Ooredoo number.</span>
                </div>
            </div>
        </div>
    </div>

    <div class="payment-options-section">
        <span class="options-title">Payment Options</span>
        <div class="options-subtitle">Enjoy app features with more payment options</div>
    </div>

    <div class="footer-action">
        <button class="main-pay-btn" id="payFinalBtn" disabled>Pay (KWD 0.000)</button>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item"><img src="https://img.icons8.com/material-outlined/48/757575/home--v1.png"><span>Home</span></a>
        <a href="#" class="nav-item"><img src="https://img.icons8.com/material-outlined/48/757575/dashboard-layout.png"><span>Manage</span></a>
        <a href="#" class="nav-item active">
            <div class="active-indicator"><img src="https://img.icons8.com/material-rounded/48/ed1c24/wallet.png"></div>
            <span style="color: var(--ooredoo-red); font-weight: bold;">Pay</span>
        </a>
        <a href="#" class="nav-item"><img src="https://img.icons8.com/material-outlined/48/757575/shopping-cart.png"><span>Shop</span></a>
        <a href="#" class="nav-item"><img src="https://img.icons8.com/material-outlined/48/757575/menu--v1.png"><span>More</span></a>
    </nav>

    <script>
        const wrapper = document.getElementById('fieldsWrapper');
        const addBtn = document.getElementById('addMoreFields');
        const payBtn = document.getElementById('payFinalBtn');
        const ooredooPrefixes = ['50', '51', '55', '56', '60', '65', '66', '67', '69', '90', '94', '96', '97', '98', '99'];

        addBtn.addEventListener('click', () => {
            const rows = document.querySelectorAll('.row-group');
            if (rows.length < 10) { 
                const newGroup = document.createElement('div');
                newGroup.className = 'row-group';
                newGroup.innerHTML = `
                    <div class="inputs-row-item">
                        <div class="field-box">
                            <div class="input-container">
                                <input type="tel" class="phone-input" placeholder="Phone Number" maxlength="8">
                            </div>
                        </div>
                        <div class="field-box amount-box">
                            <div class="input-container">
                                <input type="text" class="amount-input" placeholder="0.000">
                                <span class="currency-tag">KWD</span>
                            </div>
                        </div>
                        <button class="btn-delete" onclick="this.closest('.row-group').remove(); calculateTotal();" style="background:none; border:none; cursor:pointer; margin-bottom:12px;">
                            <img src="https://img.icons8.com/material-rounded/48/ed1c24/trash.png" style="width:20px;">
                        </button>
                    </div>
                    <div class="error-message">
                        <img src="https://img.icons8.com/material-rounded/24/b12a2e/cancel.png">
                        <span class="error-text">Please enter an Ooredoo number.</span>
                    </div>
                `;
                wrapper.appendChild(newGroup);
                attachEvents();
            }
        });

        function attachEvents() {
            document.querySelectorAll('.phone-input, .amount-input').forEach(input => {
                input.addEventListener('input', calculateTotal);
            });
        }

        function calculateTotal() {
            let total = 0;
            let allValid = true;
            const groups = document.querySelectorAll('.row-group');

            groups.forEach(group => {
                const phoneInput = group.querySelector('.phone-input');
                const amountInput = group.querySelector('.amount-input');
                const errorBox = group.querySelector('.error-message');
                const errorText = group.querySelector('.error-text');
                
                const phoneVal = phoneInput.value;
                const amountVal = parseFloat(amountInput.value) || 0;
                total += amountVal;

                const isOoredoo = ooredooPrefixes.some(p => phoneVal.startsWith(p));

                if (phoneVal.length > 0) {
                    if (!isOoredoo) {
                        errorBox.style.display = 'flex';
                        errorText.textContent = 'Please enter an Ooredoo number.';
                        allValid = false;
                    } else if (phoneVal.length < 8) {
                        errorBox.style.display = 'flex';
                        errorText.textContent = 'Phone number must be exactly 8 digits.';
                        allValid = false;
                    } else {
                        errorBox.style.display = 'none';
                    }
                } else {
                    errorBox.style.display = 'none';
                    allValid = false;
                }
            });

            payBtn.textContent = `Pay (KWD ${total.toFixed(3)})`;
            if (allValid && total > 0) {
                payBtn.style.backgroundColor = "#ed1c24";
                payBtn.style.color = "#fff";
                payBtn.disabled = false;
            } else {
                payBtn.style.backgroundColor = "#f1f1f1";
                payBtn.style.color = "#b5b5b5";
                payBtn.disabled = true;
            }
        }

        payBtn.addEventListener('click', () => {
            window.location.href = 'Payment_Methods.php'; 
        });

        attachEvents();
    </script>
</body>
</html>
